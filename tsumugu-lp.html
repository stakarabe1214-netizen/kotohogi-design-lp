fr);gap:22px}\n@media (max-width: 920px){ .test-grid{grid-template-columns:1fr} }\n\n.test{\n  background:#fff;border-radius:var(--r-md);padding:32px 30px;\n  border:.5px solid var(--line);\n  position:relative;\n}\n.test .qmark{\n  position:absolute;top:18px;right:24px;\n  font-family:var(--font-hand-en);font-weight:700;font-size:80px;color:var(--gold);opacity:.7;line-height:.6;\n}\n.test p{margin:0 0 24px;font-size:14.5px;line-height:2;color:var(--ink)}\n.test .who{display:flex;align-items:center;gap:14px;padding-top:20px;border-top:1px solid var(--line)}\n.test .ava{\n  width:46px;height:46px;border-radius:50%;\n  background:linear-gradient(135deg,var(--gold),var(--terra-soft));\n  display:grid;place-items:center;color:#fff;font-family:var(--font-display);font-weight:700;font-size:16px;\n}\n.test .who-info b{display:block;font-size:13px;font-weight:700;letter-spacing:.05em}\n.test .who-info span{font-size:11px;color:var(--ink-soft);font-family:var(--font-mono);letter-spacing:.1em}\n\n/* ─────────── faq ─────────── */\n.faq{max-width:820px;margin:0 auto}\n.faq details{\n  background:#fff;border:.5px solid var(--line);border-radius:var(--r-sm);\n  margin-bottom:12px;overflow:hidden;\n  transition:border-color .3s, box-shadow .3s;\n}\n.faq details[open]{border-color:var(--line-warm);box-shadow:var(--shadow-sm)}\n.faq summary{\n  list-style:none;cursor:default;padding:22px 26px;\n  display:flex;align-items:center;gap:18px;\n  font-family:var(--font-hand-jp);font-weight:600;letter-spacing:.03em;font-size:1.02rem;\n}\n.faq summary::-webkit-details-marker{display:none}\n.faq summary .q{\n  flex-shrink:0;width:30px;height:30px;border-radius:50%;\n  background:var(--terra);color:#fff;\n  display:grid;place-items:center;font-family:var(--font-display);font-weight:700;font-size:13px;\n}\n.faq summary .arr{\n  margin-left:auto;flex-shrink:0;width:24px;height:24px;\n  display:grid;place-items:center;color:var(--ink-soft);\n  transition:transform .35s;\n}\n.faq details[open] s :\"\";position:absolute;width:18px;height:18px;border:3px solid var(--ink);background:#fff;\n}\n.qr-mini::before{top:4px;left:4px}\n.qr-mini::after{bottom:4px;right:4px}\n.qr-card .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;color:var(--ink-faint);text-transform:uppercase}\n.qr-card .val{font-size:13.5px;font-weight:600;margin-top:4px}\n\n/* form */\n.form-card{\n  background:#fff;color:var(--ink);\n  border-radius:var(--r-md);\n  padding:38px 38px;\n  box-shadow:0 30px 80px rgba(0,0,0,.18);\n}\n@media (max-width: 540px){ .form-card{padding:28px 22px} }\n\n.form-card .h-display{font-size:1.4rem;margin-bottom:6px;color:var(--ink)}\n.form-card .h-display em::after{background:var(--gold);opacity:.4}\n.form-card .lede{font-size:13px;margin-bottom:24px;color:var(--ink-soft)}\n\n.field{margin-bottom:18px}\n.field label{\n  display:flex;align-items:center;gap:8px;\n  font-size:12px;letter-spacing:.05em;font-weight:600;margin-bottom:8px;color:var(--ink);\n}\n.field label .req{\n  font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;\n  background:var(--terra);color:#fff;padding:2px 7px;border-radius:4px;font-weight:500;\n}\n.field label .opt{font-family:var(--font-mono);font-size:9px;color:var(--ink-faint);font-weight:400}\n.field input, .field textarea{\n  width:100%;border:1.5px solid var(--line);background:var(--paper);\n  border-radius:10px;padding:14px 16px;\n  font:inherit;font-size:14px;color:var(--ink);\n  transition:border-color .25s, background .25s, box-shadow .25s;\n}\n.field input:focus, .field textarea:focus{\n  outline:none;border-color:var(--gold-deep);background:#fff;\n  box-shadow:0 0 0 4px rgba(232,196,143,.2);\n}\n.field textarea{min-height:120px;resize:vertical;line-height:1.7}\n.btn-submit{\n  width:100%;\n  padding:18px 24px;\n  background:var(--ink);color:#fff;\n  border:0;border-radius:12px;font-weight:700;font-size:15px;letter-spacing:.08em;\n  cursor:default;\n  display:flex;align-items:center;justify-content:cen bottom:24px;z-index:50;\n  background:var(--terra);color:#fff;\n  padding:14px 22px;border-radius:999px;\n  font-size:13px;font-weight:700;letter-spacing:.05em;\n  box-shadow:0 12px 30px rgba(212,133,106,.4), inset 0 1px 0 rgba(255,255,255,.2);\n  display:flex;align-items:center;gap:10px;\n  opacity:0;transform:translateY(20px);pointer-events:none;\n  transition:opacity .4s, transform .4s, background .25s;\n}\n.floating-cta.show{opacity:1;transform:none;pointer-events:auto}\n.floating-cta:hover{background:var(--terra-deep)}\n@media (max-width: 540px){ .floating-cta{right:14px;bottom:14px} }\n\n/* misc decorative */\n.deco-dot{\n  position:absolute;width:8px;height:8px;border-radius:50%;background:var(--gold);\n  opacity:.5;\n}\n\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- Header -->\n<header class=\"hdr\" id=\"hdr\">\n  <a class=\"logo\" href=\"#top\" aria-label=\"ホームへ\">\n    <span class=\"logo-mark\" aria-hidden=\"true\"><\u002Fspan>\n    <span class=\"logo-name\">tsumugu<small>AI × DESIGN STUDIO<\u002Fsmall><\u002Fspan>\n  <\u002Fa>\n  <div class=\"hdr-right\">Kobe — Japan / Est. 2026<\u002Fdiv>\n<\u002Fheader>\n\n<!-- ───────── Hero ───────── -->\n<section class=\"hero\" id=\"top\" data-screen-label=\"01 Hero\">\n  <span class=\"bg-mark\" aria-hidden=\"true\">tsumugu.<\u002Fspan>\n\n  <div class=\"hero-grid\">\n    <div class=\"hero-text\">\n      <span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>AI × Design Studio<\u002Fspan><span class=\"bar\"><\u002Fspan><span>Kobe<\u002Fspan><\u002Fspan>\n      <h1>\n        AI×デザインで、<br>\n        伝わる<span class=\"accent\">販促物<\u002Fspan>を<br>\n        もっと早く、もっと身近に。\n      <\u002Fh1>\n      <p class=\"sub\">\n        AIによるスピード感と、デザイナーの丁寧な仕上がり。<br>\n        チラシ・SNS・LP・撮影・ブランディングまで<br>\n        ワンストップでサポートします。\n      <\u002Fp>\n      <div class=\"hero-ctas\">\n        <a class=\"btn\" href=\"#contact\">\n          まずはお気軽にご相談ください\n          <span class=\"arr\" aria-hidden=\"true\">\n            <svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fspan>\n        <\u002Fa>\n        <a class=\"btn-ghost\" href=\"#services\">\n          サービスを見る\n          <svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n      <\u002Fdiv>\n      <div class=\"hero-meta\">\n        <div><b>01<\u002Fb> &nbsp;Brand &amp; Print<\u002Fdiv>\n        <div><b>02<\u002Fb> &nbsp;Web &amp; Social<\u002Fdiv>\n        <div><b>03<\u002Fb> &nbsp;Photo &amp; AI<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"hero-art\" aria-hidden=\"true\">\n      <div class=\"ring r1\"><\u002Fdiv>\n      <div class=\"ring r2\"><\u002Fdiv>\n      <div class=\"ring r3\"><\u002Fdiv>\n      <div class=\"blob\"><\u002Fdiv>\n\n      <div class=\"lines\">\n        <svg viewBox=\"0 0 400 400\" preserveAspectRatio=\"none\">\n          <path d=\"M -20 60 Q 100 120 200 80 T 420 140\"><\u002Fpath>\n          <path d=\"M -20 200 Q 120 260 220 220 T 420 280\"><\u002Fpath>\n          <path d=\"M -20 340 Q 100 380 200 320 T 420 360\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n\n      <!-- feather -->\n      <svg class=\"feather\" viewBox=\"0 0 100 220\" fill=\"none\">\n        <defs>\n          <linearGradient id=\"fg1\" x1=\"0\" x2=\"1\" y1=\"0\" y2=\"1\">\n            <stop offset=\"0\" stop-color=\"#D4856A\"><\u002Fstop>\n            <stop offset=\"1\" stop-color=\"#B86B52\"><\u002Fstop>\n          <\u002FlinearGradient>\n        <\u002Fdefs>\n        <path d=\"M50 10 C 30 60, 10 130, 35 210 C 55 200, 60 180, 60 160 C 80 130, 92 90, 80 50 C 72 25, 60 12, 50 10 Z\" fill=\"url(#fg1)\" opacity=\".95\"><\u002Fpath>\n        <path d=\"M50 18 L 38 200\" stroke=\"#fff\" stroke-width=\"1.4\" opacity=\".5\"><\u002Fpath>\n        <g stroke=\"#fff\" stroke-width=\".7\" opacity=\".55\">\n          <path d=\"M44 50 C 54 48, 62 50, 68 56\"><\u002Fpath>\n          <path d=\"M40 80 C 52 76, 64 78, 72 86\"><\u002Fpath>\n          <path d=\"M37 110 C 50 105, 65 108, 74 118\"><\u002Fpath>\n          <path d=\"M35 140 C 50 134, 64 138, 72 150\"><\u002Fpath>\n          <path d=\"M34 170 C 47 164, 60 168, 66 180\"><\u002Fpath>\n        <\u002Fg>\n      <\u002Fsvg>\n\n      <svg class=\"feather2\" viewBox=\"0 0 100 220\" fill=\"none\">\n        <path d=\"M50 10 C 30 60, 10 130, 35 210 C 55 200, 60 180, 60 160 C 80 130, 92 90, 80 50 C 72 25, 60 12, 50 10 Z\" fill=\"#E8C48F\" opacity=\".85\"><\u002Fpath>\n        <path d=\"M50 18 L 38 200\" stroke=\"#fff\" stroke-width=\"1.4\" opacity=\".5\"><\u002Fpath>\n      <\u002Fsvg>\n\n      <!-- floating tools -->\n      <div class=\"tool t1\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 19l7-7 3 3-7 7-3-3z\"><\u002Fpath><path d=\"M18 13l-1.5-7.5L2 2l3.5 14.5L13 18z\"><\u002Fpath><path d=\"M2 2l7.586 7.586\"><\u002Fpath><circle cx=\"11\" cy=\"11\" r=\"2\"><\u002Fcircle><\u002Fsvg>\n        Pen\n      <\u002Fdiv>\n      <div class=\"tool t2\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z\"><\u002Fpath><circle cx=\"12\" cy=\"13\" r=\"4\"><\u002Fcircle><\u002Fsvg>\n        Camera\n      <\u002Fdiv>\n      <div class=\"tool t3\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"3\" width=\"20\" height=\"14\" rx=\"2\"><\u002Frect><line x1=\"8\" y1=\"21\" x2=\"16\" y2=\"21\"><\u002Fline><line x1=\"12\" y1=\"17\" x2=\"12\" y2=\"21\"><\u002Fline><\u002Fsvg>\n        Studio\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ───────── Pain points ───────── -->\n<section class=\"section section-cream\" id=\"pain\" data-screen-label=\"02 Pain Points\">\n  <div class=\"wrap\">\n    <div class=\"section-head reveal\">\n      <div>\n        <span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Worries<\u002Fspan><\u002Fspan>\n        <h2 class=\"h-display\" style=\"margin-top:18px\">こんなお悩み、<br><em>ありませんか？<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"lede\">毎日の発信、商品の魅力づけ、AIへの一歩目──<br>小さく見えて、後回しにしがちな「販促のもやもや」。<br>ひとつずつ、一緒に解いていきましょう。<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"pain-grid\">\n      <article class=\"pain reveal\">\n        <span class=\"num\">№ 01<\u002Fspan>\n        <div class=\"ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3 2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <p>チラシやSNS画像を作るのに、毎回時間がかかってしまう。<\u002Fp>\n      <\u002Farticle>\n      <article class=\"pain reveal d2\">\n        <span class=\"num\">№ 02<\u002Fspan>\n        <div class=\"ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><circle cx=\"9\" cy=\"10\" r=\".5\" fill=\"currentColor\"><\u002Fcircle><circle cx=\"13\" cy=\"10\" r=\".5\" fill=\"currentColor\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n        <p>お店や商品の魅力が、なかなかうまく伝わらない。<\u002Fp>\n      <\u002Farticle>\n      <article class=\"pain reveal d3\">\n        <span class=\"num\">№ 03<\u002Fspan>\n        <div class=\"ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"12\" y1=\"1\" x2=\"12\" y2=\"23\"><\u002Fline><path d=\"M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <p>デザイン会社に頼むと、予算的に少し厳しい。<\u002Fp>\n      <\u002Farticle>\n      <article class=\"pain reveal d4\">\n        <span class=\"num\">№ 04<\u002Fspan>\n        <div class=\"ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"6\" width=\"16\" height=\"14\" rx=\"2\"><\u002Frect><circle cx=\"9\" cy=\"13\" r=\"1.2\"><\u002Fcircle><circle cx=\"15\" cy=\"13\" r=\"1.2\"><\u002Fcircle><path d=\"M12 2v4M9 20v2M15 20v2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <p>AIを業務に活かしたいけれど、何から始めればいいかわからない。<\u002Fp>\n      <\u002Farticle>\n    <\u002Fdiv>\n\n    <p class=\"pain-closing reveal\">そんな方に、優しく寄り添いながらサポートさせていただきます。<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ───────── Strengths ───────── -->\n<section class=\"section section-paper\" id=\"strengths\" data-screen-label=\"03 Strengths\">\n  <div class=\"wrap\">\n    <div class=\"section-head reveal\">\n      <div>\n        <span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Our Strengths<\u002Fspan><\u002Fspan>\n        <h2 class=\"h-display\" style=\"margin-top:18px\">高品質を、<em>圧倒的な納期<\u002Fem>と<br>低コストでご提供。<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"lede\">AIで素早くたたき台をつくり、デザイナーが意図と心地よさを編み込みます。<br>\"早い・丁寧・話しやすい\"を、ぜんぶ叶えるチームです。<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- process -->\n    <div class=\"process reveal\">\n      <div class=\"proc-step ai\">\n        <div class=\"ico-big\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2l2.5 5L20 8.5l-3.8 3.7.9 5.3L12 15l-5.1 2.5.9-5.3L4 8.5 9.5 7z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <span class=\"badge\">STEP 01<\u002Fspan>\n        <h4>AIで下案を生成<\u002Fh4>\n        <p>方向性・文章・ラフを eal d2\">\n        <span class=\"qmark\" aria-hidden=\"true\">\"<\u002Fspan>\n        <p>AIで案を出してから人の手で仕上げる流れが自然で、料金も納得感がありました。商品の写真がほんとうに美味しそうに撮れていて感激。<\u002Fp>\n        <div class=\"who\"><div class=\"ava\">S<\u002Fdiv><div class=\"who-info\"><b>佐伯さま<\u002Fb><span>飲食店 / 神戸市<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Farticle>\n      <article class=\"test reveal d3\">\n        <span class=\"qmark\" aria-hidden=\"true\">\"<\u002Fspan>\n        <p>大手にお願いするほどではないけれど、自分でやるには少し不安。そんな\"ちょうどいい距離\"でお願いできるパートナーです。<\u002Fp>\n        <div class=\"who\"><div class=\"ava\">K<\u002Fdiv><div class=\"who-info\"><b>木村さま<\u002Fb><span>個人事業 / 大阪市<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ───────── FAQ ───────── -->\n<section class=\"section section-paper\" id=\"faq\" data-screen-label=\"09 FAQ\">\n  <div class=\"wrap\">\n    <div class=\"section-head reveal\">\n      <div>\n        <span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>FAQ<\u002Fspan><\u002Fspan>\n        <h2 class=\"h-display\" style=\"margin-top:18px\">よくある<em>ご質問<\u002Fem>。<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"lede\">気になることを、よく聞かれる順に並べました。<br>ここに答えがなければ、お気軽にご連絡ください。<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"faq\">\n      <details class=\"reveal\" open=\"\"><summary><span class=\"q\">Q<\u002Fspan><span>納期はどのくらいですか？<\u002Fspan><span class=\"arr\"><svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fsummary><div class=\"ans\">内容にもよりますが、SNS素材は最短当日、チラシは3〜5営業日、LPは2週間〜が目安です。お急ぎの場合はご相談ください。<\u002Fdiv><\u002Fdetails>\n      <details class=\"reveal\"><summary><span class=\"q\">Q<\u002Fspan><span>遠方なのですが対応してもらえますか？<\u002Fspan><span class=\"arr\"><svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fsummary><div class=\"ans\">神戸市北区を拠点に、全国対応しております。打ち合わせはオンラインで、撮影は出張も承ります。<\u002Fdiv><\u002Fdetails>\n      <details class=\"reveal\"><summary><span class=\"q\">Q<\u002Fspan><span>AIで作ったものを、そのまま納品してくれるのですか？<\u002Fspan><span class=\"arr\"><svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fsummary><div class=\"ans\">いいえ。AIはあくまで下案づくりまで。最終的なデザインは必ずデザイナーが手で仕上げ、商用利用に問題のない形でお渡しします。<\u002Fdiv><\u002Fdetails>\n      <details class=\"reveal\"><summary><span class=\"q\">Q<\u002Fspan><span>修正は何回までできますか？<\u002Fspan><span class=\"arr\"><svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fsummary><div class=\"ans\">基本的に2回まで無料、それ以降は内容により別途お見積りいたします。事前にどの範囲まで含むかも明示してご相談に乗ります。<\u002Fdiv><\u002Fdetails>\n      <details class=\"reveal\"><summary><span class=\"q\">Q<\u002Fspan><span>支払い方法は？<\u002Fspan><span class=\"arr\"><svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fsummary><div class=\"ans\">原則、銀行振込（前金または納品後）にて承っております。継続案件の場合は月締めも可能です。<\u002Fdiv><\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ───────── About ───────── -->\n<section class=\"section section-cream\" id=\"about\" data-screen-label=\"10 About\">\n  <div class=\"wrap\">\n    <div class=\"about\">\n      <div class=\"about-art reveal\" aria-hidden=\"true\">\n        <div class=\"glow\"><\u002Fdiv>\n        <!-- abstract couple -->\n        <svg viewBox=\"0 0 400
